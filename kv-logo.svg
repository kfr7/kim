<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 320" width="500" height="320">
  <defs>
    <!-- Gold-to-orange gradient across the infinity -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#FCD34D;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#F97316;stop-opacity:1"/>
    </linearGradient>
    <!-- Soft glow on the infinity stroke -->
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Gold glow behind KV text -->
    <filter id="textGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="9" flood-color="#F59E0B" flood-opacity="0.65"/>
    </filter>
    <!-- Radial vignette / ambient glow in center -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:0.10"/>
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Dark background with subtle rounded card -->
  <rect width="500" height="320" fill="#0D0D1A" rx="18"/>

  <!-- Very faint crosshair guides (texture) -->
  <line x1="0" y1="160" x2="500" y2="160" stroke="#ffffff" stroke-width="0.4" opacity="0.04"/>
  <line x1="250" y1="0" x2="250" y2="320" stroke="#ffffff" stroke-width="0.4" opacity="0.04"/>

  <!-- Ambient center glow -->
  <ellipse cx="250" cy="145" rx="200" ry="100" fill="url(#centerGlow)"/>

  <!-- ─── Infinity symbol ─── -->
  <!-- Path: start at centre crossover, right lobe CW, then left lobe CW -->
  <path d="M 250,145
    C 288,60 425,60 425,145
    C 425,230 288,230 250,145
    C 212,60 75,60 75,145
    C 75,230 212,230 250,145 Z"
    fill="none"
    stroke="url(#goldGrad)"
    stroke-width="12"
    stroke-linecap="round"
    filter="url(#glow)"/>

  <!-- ─── Left weight plate (barbell end) ─── -->
  <!-- Outer ring -->
  <circle cx="75" cy="145" r="28" fill="none" stroke="#F59E0B" stroke-width="8" opacity="0.85"/>
  <!-- Inner ring -->
  <circle cx="75" cy="145" r="16" fill="none" stroke="#F59E0B" stroke-width="4" opacity="0.60"/>
  <!-- Centre hub -->
  <circle cx="75" cy="145" r="5" fill="#F59E0B" opacity="0.95"/>

  <!-- ─── Right weight plate (barbell end) ─── -->
  <circle cx="425" cy="145" r="28" fill="none" stroke="#F97316" stroke-width="8" opacity="0.85"/>
  <circle cx="425" cy="145" r="16" fill="none" stroke="#F97316" stroke-width="4" opacity="0.60"/>
  <circle cx="425" cy="145" r="5" fill="#F97316" opacity="0.95"/>

  <!-- ─── KV monogram at infinity crossover ─── -->
  <text
    x="250" y="153"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
    font-size="54"
    font-weight="900"
    fill="white"
    filter="url(#textGlow)"
    letter-spacing="-2">KV</text>

  <!-- ─── Subtle speed / power lines ─── -->
  <line x1="178" y1="234" x2="322" y2="234" stroke="#F59E0B" stroke-width="1.5" stroke-opacity="0.35" stroke-linecap="round"/>
  <line x1="200" y1="243" x2="300" y2="243" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.20" stroke-linecap="round"/>

  <!-- ─── Tagline ─── -->
  <text
    x="250" y="281"
    text-anchor="middle"
    font-family="'Arial','Helvetica',sans-serif"
    font-size="11"
    font-weight="400"
    fill="#9CA3AF"
    letter-spacing="7">INFINITE STRENGTH</text>
</svg>
