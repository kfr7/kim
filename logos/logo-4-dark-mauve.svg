<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="500" height="200">
  <defs>
    <linearGradient id="mauve" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6B3654"/>
      <stop offset="100%" style="stop-color:#B06B8E"/>
    </linearGradient>
  </defs>
  <rect width="500" height="200" fill="#F7F3F0"/>
  <!-- Top bar -->
  <rect x="0" y="0" width="500" height="6" fill="url(#mauve)"/>
  <!-- Main name -->
  <text x="250" y="95" font-family="Georgia, 'Times New Roman', serif" font-size="46" font-weight="400" fill="#1A1A1A" text-anchor="middle" letter-spacing="6">KIMBERLY</text>
  <!-- Decorative dash -->
  <line x1="130" y1="108" x2="190" y2="108" stroke="url(#mauve)" stroke-width="1.5"/>
  <text x="250" y="125" font-family="Georgia, serif" font-size="13" font-weight="400" fill="#6B3654" text-anchor="middle" letter-spacing="8">MONTEPEQUE</text>
  <line x1="310" y1="108" x2="370" y2="108" stroke="url(#mauve)" stroke-width="1.5"/>
  <!-- Bottom bar -->
  <rect x="0" y="194" width="500" height="6" fill="url(#mauve)"/>
</svg>
