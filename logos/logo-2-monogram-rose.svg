<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="500" height="200">
  <defs>
    <linearGradient id="rose" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8B4B8"/>
      <stop offset="100%" style="stop-color:#9B4F63"/>
    </linearGradient>
  </defs>
  <rect width="500" height="200" fill="#1A1A1A"/>
  <!-- Circle accent -->
  <circle cx="100" cy="100" r="60" fill="none" stroke="url(#rose)" stroke-width="1.5"/>
  <!-- KM monogram -->
  <text x="100" y="115" font-family="Georgia, serif" font-size="50" font-weight="300" fill="url(#rose)" text-anchor="middle" letter-spacing="-2">KM</text>
  <!-- Vertical divider -->
  <line x1="178" y1="40" x2="178" y2="160" stroke="#333" stroke-width="1"/>
  <!-- Name stacked -->
  <text x="330" y="85" font-family="'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="700" fill="#F0F0F0" text-anchor="middle" letter-spacing="4">KIMBERLY</text>
  <text x="330" y="118" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="300" fill="#E8B4B8" text-anchor="middle" letter-spacing="6">MONTEPEQUE</text>
  <text x="330" y="145" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="300" fill="#666" text-anchor="middle" letter-spacing="5">FITNESS</text>
</svg>
