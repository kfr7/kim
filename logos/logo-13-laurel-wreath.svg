    <ellipse cx="45" cy="120" rx="11" ry="5.5" transform="rotate(15 45 120)"/>
    <ellipse cx="40" cy="140" rx="10" ry="5" transform="rotate(35 40 140)"/>
    <ellipse cx="48" cy="158" rx="10" ry="5" transform="rotate(55 48 158)"/>
    <ellipse cx="62" cy="170" rx="10" ry="5" transform="rotate(72 62 170)"/>
