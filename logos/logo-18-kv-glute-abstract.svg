<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="rg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F2C4CE"/>
      <stop offset="100%" style="stop-color:#8B3550"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="#0A0A0A"/>
  <!-- Abstract "strength curve" — two arcs suggesting glute/body curve -->
  <!-- Left curve -->
  <path d="M55 55 Q30 100 55 148" fill="none" stroke="url(#rg4)" stroke-width="3" stroke-linecap="round"/>
  <!-- Right curve (mirrored) -->
  <path d="M145 55 Q170 100 145 148" fill="none" stroke="url(#rg4)" stroke-width="3" stroke-linecap="round"/>
  <!-- Connecting curve at bottom (strength/power arch) -->
  <path d="M55 148 Q100 175 145 148" fill="none" stroke="url(#rg4)" stroke-width="2" stroke-linecap="round"/>
  <!-- Top connector -->
  <path d="M55 55 Q100 35 145 55" fill="none" stroke="#8B3550" stroke-width="1" stroke-dasharray="4 3" stroke-linecap="round"/>
  <!-- KV center -->
  <text x="100" y="113" font-family="Georgia, serif" font-size="52" font-weight="400" fill="url(#rg4)" text-anchor="middle" letter-spacing="-3">KV</text>
  <!-- Small dots at curve endpoints -->
  <circle cx="55" cy="55" r="3" fill="#F2C4CE"/>
  <circle cx="145" cy="55" r="3" fill="#F2C4CE"/>
  <circle cx="55" cy="148" r="3" fill="#F2C4CE"/>
  <circle cx="145" cy="148" r="3" fill="#F2C4CE"/>
</svg>
