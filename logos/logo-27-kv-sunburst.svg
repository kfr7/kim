<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="g27" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5D67B"/>
      <stop offset="100%" style="stop-color:#E8955A"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="#0D0D0D"/>
  <!-- Sunburst rays (16 rays) -->
  <g stroke="url(#g27)" stroke-width="1" opacity="0.7">
    <line x1="100" y1="100" x2="100" y2="18"/>
    <line x1="100" y1="100" x2="100" y2="182"/>
    <line x1="100" y1="100" x2="18" y2="100"/>
    <line x1="100" y1="100" x2="182" y2="100"/>
    <line x1="100" y1="100" x2="42" y2="42"/>
    <line x1="100" y1="100" x2="158" y2="158"/>
    <line x1="100" y1="100" x2="158" y2="42"/>
    <line x1="100" y1="100" x2="42" y2="158"/>
    <line x1="100" y1="100" x2="71" y2="22"/>
    <line x1="100" y1="100" x2="129" y2="178"/>
    <line x1="100" y1="100" x2="178" y2="71"/>
    <line x1="100" y1="100" x2="22" y2="129"/>
    <line x1="100" y1="100" x2="22" y2="71"/>
    <line x1="100" y1="100" x2="178" y2="129"/>
    <line x1="100" y1="100" x2="129" y2="22"/>
    <line x1="100" y1="100" x2="71" y2="178"/>
  </g>
  <!-- Center filled circle to mask ray centers -->
  <circle cx="100" cy="100" r="62" fill="#0D0D0D"/>
  <!-- Ring -->
  <circle cx="100" cy="100" r="62" fill="none" stroke="url(#g27)" stroke-width="2"/>
  <!-- KV -->
  <text x="100" y="118" font-family="Georgia, serif" font-size="58" font-weight="400" fill="url(#g27)" text-anchor="middle" letter-spacing="-3">KV</text>
