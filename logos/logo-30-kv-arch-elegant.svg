<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <defs>
    <linearGradient id="g30" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C4CE"/>
      <stop offset="100%" style="stop-color:#7B2D45"/>
    </linearGradient>
  </defs>
  <rect width="200" height="220" fill="#F5F0EE"/>
  <!-- Arch frame — two pillars + arch top -->
  <line x1="38" y1="200" x2="38" y2="70" stroke="#1A1A1A" stroke-width="3"/>
  <line x1="162" y1="200" x2="162" y2="70" stroke="#1A1A1A" stroke-width="3"/>
  <!-- Arch top semicircle -->
  <path d="M38,70 A62,62 0 0,1 162,70" fill="none" stroke="#1A1A1A" stroke-width="3"/>
  <!-- Inner arch -->
  <line x1="48" y1="200" x2="48" y2="78" stroke="url(#g30)" stroke-width="1"/>
  <line x1="152" y1="200" x2="152" y2="78" stroke="url(#g30)" stroke-width="1"/>
  <path d="M48,78 A52,52 0 0,1 152,78" fill="none" stroke="url(#g30)" stroke-width="1"/>
  <!-- KV inside arch -->
  <text x="100" y="162" font-family="Georgia, 'Times New Roman', serif" font-size="68" font-weight="400" fill="#1A1A1A" text-anchor="middle" letter-spacing="-5">KV</text>
  <!-- Bottom tagline -->
  <text x="100" y="205" font-family="'Helvetica Neue', Arial, sans-serif" font-size="8" font-weight="300" fill="#9B4F63" text-anchor="middle" letter-spacing="6">KIMBERLY VANESSA</text>
</svg>
