<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="rg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F2C4CE"/>
      <stop offset="100%" style="stop-color:#9B4F63"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="#0A0A0A"/>
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="url(#rg1)" stroke-width="1.5"/>
  <!-- Barbell horizontal -->
  <rect x="28" y="96" width="144" height="8" rx="4" fill="#9B4F63"/>
  <!-- Left weight plate outer -->
  <rect x="22" y="76" width="18" height="48" rx="4" fill="none" stroke="url(#rg1)" stroke-width="2"/>
  <!-- Left weight plate inner -->
  <rect x="26" y="82" width="10" height="36" rx="2" fill="#9B4F63" opacity="0.4"/>
  <!-- Right weight plate outer -->
  <rect x="160" y="76" width="18" height="48" rx="4" fill="none" stroke="url(#rg1)" stroke-width="2"/>
  <!-- Right weight plate inner -->
  <rect x="164" y="82" width="10" height="36" rx="2" fill="#9B4F63" opacity="0.4"/>
  <!-- KV over barbell -->
  <text x="100" y="93" font-family="Georgia, serif" font-size="38" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="-2">KV</text>
  <!-- Tagline below -->
  <text x="100" y="155" font-family="'Helvetica Neue', Arial, sans-serif" font-size="8" font-weight="300" fill="#9B4F63" text-anchor="middle" letter-spacing="5">KIMBERLY VANESSA</text>
</svg>
