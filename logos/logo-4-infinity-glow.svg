<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 180" width="300" height="180">
  <defs>
    <linearGradient id="g4a" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F2C4CE" stop-opacity="0.3"/>
      <stop offset="50%" style="stop-color:#E8758A" stop-opacity="1"/>
      <stop offset="100%" style="stop-color:#F2C4CE" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="g4b" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F2C4CE"/>
      <stop offset="50%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#F2C4CE"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="300" height="180" fill="#080808"/>
  <!-- Glow infinity background layer -->
  <path d="M150,90 C150,55 122,22 95,22 C58,22 28,52 28,90 C28,128 58,158 95,158 C122,158 150,125 150,90 C150,55 178,22 205,22 C242,22 272,52 272,90 C272,128 242,158 205,158 C178,158 150,125 150,90 Z" fill="none" stroke="url(#g4a)" stroke-width="8" filter="url(#glow)"/>
  <!-- Sharp infinity on top -->
  <path d="M150,90 C150,55 122,22 95,22 C58,22 28,52 28,90 C28,128 58,158 95,158 C122,158 150,125 150,90 C150,55 178,22 205,22 C242,22 272,52 272,90 C272,128 242,158 205,158 C178,158 150,125 150,90 Z" fill="none" stroke="url(#g4b)" stroke-width="1.5"/>
  <!-- K -->
  <text x="95" y="108" font-family="Georgia, serif" font-size="58" font-weight="400" fill="#FFFFFF" text-anchor="middle" filter="url(#glow)">K</text>
  <!-- V -->
  <text x="205" y="108" font-family="Georgia, serif" font-size="58" font-weight="300" fill="#F2C4CE" text-anchor="middle">V</text>
</svg>
