<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#111"/>
  <!-- Filled circle -->
  <circle cx="100" cy="100" r="85" fill="#1E1E1E"/>
  <!-- Single thin ring -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#E8B4B8" stroke-width="1"/>
  <!-- Horizontal divider line inside -->
  <line x1="30" y1="100" x2="170" y2="100" stroke="#3A1A2A" stroke-width="1"/>
  <!-- K top half -->
  <text x="100" y="100" font-family="'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="0">K</text>
  <!-- V bottom half - slightly faded -->
  <text x="100" y="148" font-family="'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="300" fill="#E8B4B8" text-anchor="middle" letter-spacing="0">V</text>
</svg>
