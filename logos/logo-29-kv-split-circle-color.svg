<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#FAFAFA"/>
  <!-- Left half circle filled -->
  <path d="M100,18 A82,82 0 0,0 100,182 Z" fill="#1A1A1A"/>
  <!-- Right half circle filled -->
  <path d="M100,18 A82,82 0 0,1 100,182 Z" fill="#9B4F63"/>
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="82" fill="none" stroke="#1A1A1A" stroke-width="2"/>
  <!-- K on dark side (white) -->
  <text x="68" y="118" font-family="Georgia, serif" font-size="55" font-weight="400" fill="#FFFFFF" text-anchor="middle" letter-spacing="0">K</text>
  <!-- V on rose side (white) -->
  <text x="132" y="118" font-family="Georgia, serif" font-size="55" font-weight="400" fill="#FFFFFF" text-anchor="middle" letter-spacing="0">V</text>
  <!-- Center dividing line -->
  <line x1="100" y1="18" x2="100" y2="182" stroke="#FAFAFA" stroke-width="2"/>
</svg>
