<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="g6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C4B0"/>
      <stop offset="100%" style="stop-color:#B07050"/>
    </linearGradient>
    <path id="topArc" d="M 20,100 A 80,80 0 0,1 180,100"/>
    <path id="botArc" d="M 30,115 A 75,75 0 0,0 170,115"/>
  </defs>
  <rect width="200" height="200" fill="#0D0D0D"/>
  <!-- Main circle -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="url(#g6)" stroke-width="1.5"/>
  <!-- Text on top arc -->
  <text font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="400" fill="#E8C4B0" letter-spacing="5">
    <textPath href="#topArc" startOffset="15%">KIMBERLY VANESSA</textPath>
  </text>
  <!-- Big KV center -->
  <text x="100" y="118" font-family="Georgia, serif" font-size="72" font-weight="400" fill="url(#g6)" text-anchor="middle" letter-spacing="-6">KV</text>
  <!-- Bottom arc text -->
  <text font-family="'Helvetica Neue', Arial, sans-serif" font-size="8" font-weight="300" fill="#B07050" letter-spacing="4">
    <textPath href="#botArc" startOffset="22%">FITNESS · LIFESTYLE</textPath>
  </text>
  <!-- Small diamond top -->
  <polygon points="100,16 104,22 100,28 96,22" fill="#E8C4B0"/>
</svg>
