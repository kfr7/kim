<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="500" height="200">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9A84C"/>
      <stop offset="50%" style="stop-color:#F5D67B"/>
      <stop offset="100%" style="stop-color:#C9A84C"/>
    </linearGradient>
  </defs>
  <rect width="500" height="200" fill="#0A0A0A"/>
  <!-- Thin line above -->
  <line x1="60" y1="45" x2="440" y2="45" stroke="url(#gold)" stroke-width="0.8"/>
  <!-- Name -->
  <text x="250" y="110" font-family="Georgia, serif" font-size="52" font-weight="400" fill="url(#gold)" text-anchor="middle" letter-spacing="8">KIMBERLY</text>
  <!-- Last name smaller -->
  <text x="250" y="145" font-family="Georgia, serif" font-size="22" font-weight="300" fill="#C9A84C" text-anchor="middle" letter-spacing="14">MONTEPEQUE</text>
  <!-- Thin line below -->
  <line x1="60" y1="162" x2="440" y2="162" stroke="url(#gold)" stroke-width="0.8"/>
</svg>
