<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <defs>
    <linearGradient id="flame" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#7B2D45"/>
      <stop offset="50%" style="stop-color:#E8758A"/>
      <stop offset="100%" style="stop-color:#F5C4D0"/>
    </linearGradient>
    <linearGradient id="rg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F2C4CE"/>
      <stop offset="100%" style="stop-color:#9B4F63"/>
    </linearGradient>
  </defs>
  <rect width="200" height="220" fill="#080808"/>
  <!-- Flame shape -->
  <path d="M100 20 C85 50 60 60 65 90 C68 108 78 115 85 108 C78 125 80 145 100 155 C120 145 122 125 115 108 C122 115 132 108 135 90 C140 60 115 50 100 20Z" fill="url(#flame)" opacity="0.9"/>
  <!-- Inner flame highlight -->
  <path d="M100 45 C93 65 80 72 83 90 C85 102 92 107 97 102 C92 114 94 128 100 135 C106 128 108 114 103 102 C108 107 115 102 117 90 C120 72 107 65 100 45Z" fill="#F5C4D0" opacity="0.3"/>
  <!-- KV over flame -->
  <text x="100" y="128" font-family="Georgia, serif" font-size="50" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="-3">KV</text>
  <!-- Name below -->
  <text x="100" y="185" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="300" fill="#9B4F63" text-anchor="middle" letter-spacing="5">KIMBERLY VANESSA</text>
  <!-- Thin line -->
  <line x1="50" y1="170" x2="150" y2="170" stroke="#3A1A2A" stroke-width="1"/>
</svg>
