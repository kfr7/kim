<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="lotus" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8D5C4"/>
      <stop offset="100%" style="stop-color:#B07850"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="#F8F4F0"/>
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#B07850" stroke-width="1"/>
  <!-- Lotus petals (8 petals using ellipses) -->
  <g fill="none" stroke="url(#lotus)" stroke-width="1.2">
    <!-- Top petal -->
    <ellipse cx="100" cy="62" rx="12" ry="28" transform="rotate(0 100 100)"/>
    <!-- Top-right petal -->
    <ellipse cx="100" cy="62" rx="12" ry="28" transform="rotate(45 100 100)"/>
    <!-- Right petal -->
    <ellipse cx="100" cy="62" rx="12" ry="28" transform="rotate(90 100 100)"/>
    <!-- Bottom-right petal -->
    <ellipse cx="100" cy="62" rx="12" ry="28" transform="rotate(135 100 100)"/>
    <!-- Bottom petal -->
    <ellipse cx="100" cy="62" rx="12" ry="28" transform="rotate(180 100 100)"/>
    <!-- Bottom-left petal -->
    <ellipse cx="100" cy="62" rx="12" ry="28" transform="rotate(225 100 100)"/>
    <!-- Left petal -->
    <ellipse cx="100" cy="62" rx="12" ry="28" transform="rotate(270 100 100)"/>
    <!-- Top-left petal -->
    <ellipse cx="100" cy="62" rx="12" ry="28" transform="rotate(315 100 100)"/>
  </g>
  <!-- Center circle -->
  <circle cx="100" cy="100" r="30" fill="#F8F4F0" stroke="#B07850" stroke-width="1"/>
  <!-- KV -->
  <text x="100" y="108" font-family="Georgia, serif" font-size="26" font-weight="400" fill="#7A4E2D" text-anchor="middle" letter-spacing="-1">KV</text>
</svg>
