<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="500" height="200">
  <rect width="500" height="200" fill="#0D0D0D"/>
  <!-- Bold K -->
  <text x="55" y="130" font-family="'Helvetica Neue', Arial, sans-serif" font-size="100" font-weight="900" fill="#FFFFFF" text-anchor="start" letter-spacing="-4">K</text>
  <!-- Dot accent -->
  <circle cx="122" cy="58" r="8" fill="#C9A84C"/>
  <!-- Name right side -->
  <text x="160" y="95" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#FFFFFF" text-anchor="start" letter-spacing="2">IMBERLY</text>
  <text x="163" y="128" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="300" fill="#888888" text-anchor="start" letter-spacing="5">MONTEPEQUE</text>
  <!-- Bottom tagline -->
  <line x1="160" y1="148" x2="450" y2="148" stroke="#333" stroke-width="1"/>
  <text x="160" y="165" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="400" fill="#C9A84C" text-anchor="start" letter-spacing="6">STRENGTH · LIFESTYLE · GROWTH</text>
</svg>
