<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#FAFAFA"/>
  <!-- Thick top bar -->
  <rect x="40" y="30" width="120" height="6" fill="#1A1A1A"/>
  <!-- K big -->
  <text x="72" y="125" font-family="'Helvetica Neue', Impact, Arial, sans-serif" font-size="90" font-weight="900" fill="#1A1A1A" text-anchor="middle">K</text>
  <!-- V big, slightly offset and in color -->
  <text x="128" y="125" font-family="'Helvetica Neue', Impact, Arial, sans-serif" font-size="90" font-weight="900" fill="#9B4F63" text-anchor="middle">V</text>
  <!-- Thick bottom bar -->
  <rect x="40" y="140" width="120" height="6" fill="#9B4F63"/>
  <!-- Tagline -->
  <text x="100" y="168" font-family="'Helvetica Neue', Arial, sans-serif" font-size="8" font-weight="400" fill="#888" text-anchor="middle" letter-spacing="5">KIMBERLY VANESSA</text>
</svg>
