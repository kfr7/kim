<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="rose1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8B4B8"/>
      <stop offset="100%" style="stop-color:#9B4F63"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="#1A1A1A"/>
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="url(#rose1)" stroke-width="1.5"/>
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="78" fill="none" stroke="#9B4F63" stroke-width="0.5" stroke-dasharray="4 4"/>
  <!-- KV monogram -->
  <text x="100" y="115" font-family="Georgia, serif" font-size="62" font-weight="400" fill="url(#rose1)" text-anchor="middle" letter-spacing="-4">KV</text>
  <!-- Small text bottom arc simulation -->
  <text x="100" y="158" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="300" fill="#9B4F63" text-anchor="middle" letter-spacing="5">KIMBERLY VANESSA</text>
  <!-- Top small dot accents -->
  <circle cx="100" cy="22" r="3" fill="#E8B4B8"/>
</svg>
